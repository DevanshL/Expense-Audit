version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: expense_audit_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: expense_audit_api
    image: expense-audit-api:latest
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/expenseaudit-ai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=development_secret_only_replace_in_production
      - PORT=5000
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense_audit_web
    image: expense-audit-web:latest
    ports:
      - "5173:5173"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: expense_audit_cache
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
