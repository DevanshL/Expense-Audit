version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: expense_audit_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: expense_audit_cache
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: expense_audit_api
    image: expense-audit-api:latest
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/expenseaudit-ai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - PORT=5000
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    # NOT exposed publicly — Nginx proxies /api to this
    expose:
      - "5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense_audit_web
    image: expense-audit-web:latest
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: expense_audit_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
